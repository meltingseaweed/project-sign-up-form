<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Sign up form</title>
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <div class="left">
        <h1>Odin placeholder</h1>
    </div>

    <div class="right">
        <div class="header">
            <h2>This is not a real online service! 
                You know you need something like this in your
                life to help you realise your deepest dreams.
                <br>Sign up now to get started.</h2>
            <h2>You <em>know</em> you want to.</h2>
        </div>
        <div class="form-section">
            <h2>Let's do this!</h2>
            <form action="" method="get" class="signup-form">
                <div class="form-upper">
                    <div class="row-1">
                        <label for="first-name">first name</label>
                        <input type="text" name="first-name" id="first-name">
                        <label for="last-name">last name</label>
                        <input type="text" name="last-name" id="last-name">
                    </div>
                    <div class="row-2">
                        <label for="email">email</label>
                        <input type="email" name="email" id="email">
                        <label for="phone-number">phone number</label>
                        <input type="tel" name="phone-number" id="phone-number">
                    </div>
                    <div class="row-3">
                        <label for="password-1">password</label>
                        <input type="password" name="password-1" id="password-1">
                        <label for="password-2">password</label>
                        <input type="password" name="password-2" id="password-2">
                    </div>
                </div>
                <div class="form-lower">
                    <button type="submit" class="create">Create Account</button>
                    <div class="member">Already have an account? <em>Log in</em></div>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
